services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: idm_db
      MYSQL_USER: idm_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-idm_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "idm_user", "-p${DB_PASSWORD:-idm_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  backend:
    build:
      context: .
      dockerfile: Dockerfile 
    restart: unless-stopped
    # Changed 'config' to 'IDM'
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-insecure-dev-secret-change-me}
      - DATABASE_URL=mysql://idm_user:${DB_PASSWORD:-idm_password}@db:3306/idm_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MEDIA_ROOT=/app/media
      - NGROK_URL=${NGROK_URL}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend,nginx},.ngrok-free.dev
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  celery_worker:
    build:
      context: .
    restart: unless-stopped
    # Changed 'config' to 'IDM'
    command: celery -A IDM worker -l info -Q default,indexing,notifications
    environment:
      - DATABASE_URL=mysql://idm_user:${DB_PASSWORD:-idm_password}@db:3306/idm_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MEDIA_ROOT=/app/media
      - DJANGO_SETTINGS_MODULE=IDM.settings
    volumes:
      - .:/app
      - media_files:/app/media   
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  celery_ocr:
    build:
      context: .
    restart: unless-stopped
    command: celery -A IDM worker -Q ocr -c 2 --loglevel=info
    environment:
      - DATABASE_URL=mysql://idm_user:${DB_PASSWORD:-idm_password}@db:3306/idm_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MEDIA_ROOT=/app/media
      - DJANGO_SETTINGS_MODULE=IDM.settings
      - OCR_ENGINE=tesseract
      - OCR_LANGUAGES=eng
      - OCR_DPI=300
    volumes:
      - .:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  celery_preview:
    build:
      context: .
    restart: unless-stopped
    command: celery -A IDM worker -Q preview -c 1 --loglevel=info
    environment:
      - DATABASE_URL=mysql://idm_user:${DB_PASSWORD:-idm_password}@db:3306/idm_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MEDIA_ROOT=/app/media
      - DJANGO_SETTINGS_MODULE=IDM.settings
      - LIBREOFFICE_TIMEOUT=120
    volumes:
      - .:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env  # Points to the root .env file
    environment:
      - VITE_API_URL=${NGROK_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  es_data:
  media_files: