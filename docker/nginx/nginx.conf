upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Allow larger uploads (invoices, contracts can be large)
    client_max_body_size 50M;

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization      $http_authorization;
        proxy_read_timeout 300s;
    }

    # ── Static files (Django admin etc.) ─────────────────────────────────────
    location /static/ {
        proxy_pass http://backend;
    }

    # ── Media files (uploaded documents) ─────────────────────────────────────
    # Served directly from the shared Docker volume — fast and bypasses Django.
    # Headers are set to allow PDF.js to load the file cross-origin if needed.
    location /media/ {
        alias /app/media/;

        # Required for PDF.js to fetch the file via XHR
        add_header Access-Control-Allow-Origin  "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"          always;
        add_header Access-Control-Allow-Headers "Authorization, Range"  always;

        # Support range requests so PDF.js can load pages on demand
        add_header Accept-Ranges bytes;

        # Don't cache in dev — change to 1d or 7d in production
        expires off;
        add_header Cache-Control "private, no-store";

        # Correct MIME types
        types {
            application/pdf                                                   pdf;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            application/msword                                                doc;
            application/vnd.ms-excel                                          xls;
            image/png                                                         png;
            image/jpeg                                                        jpg jpeg;
        }
    }

    # ── WebSocket (Django Channels) ───────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # ── Frontend (all other requests → Vite dev server) ───────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Required for Vite HMR (hot module replacement) WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
